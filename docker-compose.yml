services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studycompanion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment}
      POSTGRES_DB: ${POSTGRES_DB:-study_companion}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      NODE_ENV: production
      POSTGRES_URL: postgres://${POSTGRES_USER:-studycompanion}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment}@postgres:5432/${POSTGRES_DB:-study_companion}
      GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in your environment}
      GROQ_MODEL: ${GROQ_MODEL:-llama3-70b-8192}
      HINDSIGHT_BASE_URL: ${HINDSIGHT_BASE_URL:-https://api.hindsight.vectorize.io}
      HINDSIGHT_API_KEY: ${HINDSIGHT_API_KEY:?Set HINDSIGHT_API_KEY in your environment}
      HINDSIGHT_BANK_PREFIX: ${HINDSIGHT_BANK_PREFIX:-study-companion}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OPENCLAW_WEBHOOK_SECRET: ${OPENCLAW_WEBHOOK_SECRET:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
